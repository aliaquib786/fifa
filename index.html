<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA World Cup Live Scores</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #22c55e;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            border-bottom: 1px solid #334155;
            padding-bottom: 12px;
        }

        h1 {
            font-size: 24px;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .live-indicator {
            width: 10px;
            height: 10px;
            background-color: var(--accent);
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.5; }
        }

        .refresh-btn {
            background-color: #334155;
            color: var(--text-main);
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .refresh-btn:hover {
            background-color: #475569;
        }

        .match-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .match-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            text-align: center;
        }

        .league-title {
            grid-column: span 3;
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
            border-bottom: 1px solid #334155;
            padding-bottom: 6px;
        }

        .team {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .team img {
            width: 48px;
            height: 48px;
            object-fit: contain;
        }

        .team-name {
            font-size: 15px;
            font-weight: 600;
        }

        .score-zone {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0 20px;
        }

        .score {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 4px;
        }

        .match-time {
            background-color: #111827;
            color: var(--accent);
            padding: 4px 10px;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: bold;
            margin-top: 8px;
        }

        .no-matches {
            text-align: center;
            color: var(--text-muted);
            padding: 40px;
            background-color: var(--card-bg);
            border-radius: 12px;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1><span class="live-indicator"></span> FIFA World Cup Scores</h1>
            <button class="refresh-btn" onclick="fetchLiveScores()">Refresh</button>
        </header>

        <div id="scoreboard" class="match-list">
            <div class="no-matches">Loading live match feeds...</div>
        </div>
    </div>

    <script>
        const apiKey = "c66a724ae6e19b5811224e82c6a2f99f";
        const apiUrl = "https://v3.football.api-sports.io/fixtures?live=all";

        async function fetchLiveScores() {
            const scoreboard = document.getElementById("scoreboard");
            
            try {
                const response = await fetch(apiUrl, {
                    method: "GET",
                    headers: {
                        "x-apisports-key": apiKey
                    }
                });

                if (!response.ok) {
                    throw new Error("API server response issue");
                }

                const data = await response.json();
                const allMatches = data.response || [];

                // Strict FIFA Filter: Targets World Cup matches specifically while blocking club friendlies
                const matches = allMatches.filter(match => {
                    if (!match.league) return false;
                    
                    const leagueId = match.league.id;
                    const leagueName = (match.league.name || "").toUpperCase();

                    return (
                        leagueId === 1 || 
                        (leagueName.includes("WORLD CUP") && !leagueName.includes("CLUBS")) ||
                        leagueName.includes("FIFA WORLD CUP")
                    );
                });

                if (matches.length === 0) {
                    scoreboard.innerHTML = `
                        <div class="no-matches">
                            <p>No FIFA World Cup matches are live right now.</p>
                            <p style="font-size: 13px; color: var(--text-muted);">Matches show here automatically when they kickoff.</p>
                        </div>`;
                    return;
                }

                // Render match cards dynamically
                scoreboard.innerHTML = matches.map(match => `
                    <div class="match-card">
                        <div class="league-title">${match.league.name} (${match.league.country})</div>
                        
                        <div class="team">
                            <img src="${match.teams.home.logo}" alt="${match.teams.home.name}" onerror="this.src='https://media.api-sports.io/football/teams/unknown.png'">
                            <span class="team-name">${match.teams.home.name}</span>
                        </div>

                        <div class="score-zone">
                            <div class="score">${match.goals.home} - ${match.goals.away}</div>
                            <div class="match-time">${match.fixture.status.elapsed}' mins</div>
                        </div>

                        <div class="team">
                            <img src="${match.teams.away.logo}" alt="${match.teams.away.name}" onerror="this.src='https://media.api-sports.io/football/teams/unknown.png'">
                            <span class="team-name">${match.teams.away.name}</span>
                        </div>
                    </div>
                `).join('');

            } catch (error) {
                console.error("Error loading scores:", error);
                scoreboard.innerHTML = `<div class="no-matches" style="color: #ef4444;">Failed to fetch live score streams. Check your internet or console logs.</div>`;
            }
        }

        // Run fetch instantly on page load
        fetchLiveScores();

        // Updates every 2 minutes
        setInterval(fetchLiveScores, 120000);
    </script>
</body>
</html>
