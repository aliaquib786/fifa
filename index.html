<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>FIFA World Cup 2026 — Live Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f9f8f4;--white:#fff;--surface:#fdfcf8;
  --gold:#c8a84b;--gold2:#a87e20;--gold-lt:#fef6dc;--gold-bg:#fffaf0;
  --ink:#17150d;--ink2:#36321f;--muted:#7c7660;--faint:#b5af9e;
  --rule:#e5dfc8;--rule2:#ccc6b0;
  --green:#1a6b3a;--green-bg:#e6f4ed;
  --red:#bf3828;--red-bg:#fbeae7;
  --r:8px;--sh:0 1px 3px rgba(0,0,0,.05),0 4px 12px rgba(0,0,0,.06);
  --sh2:0 4px 16px rgba(0,0,0,.1);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;line-height:1.5;min-height:100vh;}

/* ── HEADER ── */
.hdr{background:var(--white);border-bottom:2.5px solid var(--gold);position:sticky;top:0;z-index:999;box-shadow:0 2px 8px rgba(200,168,75,.12);}
.hdr-inner{max-width:1400px;margin:0 auto;padding:0 16px;display:flex;align-items:center;gap:12px;height:54px;}
.logo{display:flex;align-items:center;gap:9px;text-decoration:none;flex-shrink:0;}
.logo-ico{width:32px;height:32px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;}
.logo-txt{line-height:1.1;}
.logo-txt b{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:var(--ink);display:block;}
.logo-txt small{font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}
.hdr-pills{display:flex;gap:4px;}
.pill{padding:2px 7px;border-radius:20px;font-size:9px;font-weight:700;border:1.5px solid;}
.p-us{color:#b22234;border-color:#b22234;background:#fff5f6;}
.p-ca{color:#cc0000;border-color:#cc0000;background:#fff5f5;}
.p-mx{color:#006847;border-color:#006847;background:#f0fff7;}
.hdr-r{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.tz-box{background:var(--gold-bg);border:1.5px solid var(--gold);border-radius:6px;padding:4px 10px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--gold2);display:flex;align-items:center;gap:5px;white-space:nowrap;}
.tz-box span{font-family:'Inter',sans-serif;font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.nav-tabs{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;}
.nav-tabs::-webkit-scrollbar{display:none;}
.nav-tabs button{background:none;border:none;padding:5px 11px;border-radius:6px;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .15s;}
.nav-tabs button:hover{background:var(--gold-lt);color:var(--gold2);}
.nav-tabs button.on{background:var(--gold);color:#fff;}

/* ── TICKER ── */
.ticker{background:var(--ink);overflow:hidden;display:flex;align-items:stretch;}
.ticker-lbl{background:var(--gold);color:var(--ink);font-size:8px;font-weight:900;letter-spacing:2px;padding:0 12px;display:flex;align-items:center;flex-shrink:0;text-transform:uppercase;}
.ticker-body{display:flex;align-items:center;gap:0;overflow-x:auto;scrollbar-width:none;padding:7px 0;}
.ticker-body::-webkit-scrollbar{display:none;}
.tk{display:flex;align-items:center;gap:6px;padding:0 16px;border-right:1px solid rgba(255,255,255,.08);white-space:nowrap;color:#ddd;font-size:11px;}
.tk:last-child{border-right:none;}
.tk-live{background:var(--red);color:#fff;font-size:7px;font-weight:900;padding:2px 5px;border-radius:3px;letter-spacing:1px;animation:blink 1.4s infinite;}
.tk-ft{color:#3dba7a;font-size:8px;font-weight:800;letter-spacing:1px;}
.tk-soon{color:var(--gold);font-size:8px;font-weight:800;}
.tk-sc{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--gold);font-size:12px;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

/* ── HERO ── */
.hero{background:linear-gradient(150deg,var(--gold-bg) 0%,var(--white) 55%);border-bottom:1px solid var(--rule);padding:22px 16px 18px;position:relative;overflow:hidden;}
.hero::after{content:'2026';position:absolute;right:-8px;top:50%;transform:translateY(-50%);font-family:'Bebas Neue',sans-serif;font-size:140px;color:rgba(200,168,75,.055);line-height:1;pointer-events:none;}
.hero-in{max-width:1400px;margin:0 auto;}
.hero-eye{font-size:9px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:5px;}
.hero h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(26px,4vw,50px);letter-spacing:3px;line-height:1;margin-bottom:5px;}
.hero h1 em{font-style:normal;color:var(--gold);}
.hero-sub{font-size:12px;color:var(--muted);margin-bottom:14px;}
.kpis{display:flex;flex-wrap:wrap;}
.kpi{padding:8px 16px 8px 0;margin-right:16px;border-right:1px solid var(--rule);}
.kpi:last-child{border-right:none;}
.kpi-n{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--gold);line-height:1;}
.kpi-l{font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}

/* ── PAGE ── */
.page{max-width:1400px;margin:0 auto;padding:18px 16px;}
.pane{display:none;}.pane.on{display:block;}

/* ── AI STATUS CHIP ── */
.ai-chip{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--white);border:1px solid var(--rule);border-radius:var(--r);margin-bottom:16px;font-size:11px;color:var(--muted);}
.ai-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:var(--green);}
.ai-dot.spin{background:var(--gold);animation:blink .8s infinite;}
.ai-dot.err{background:var(--red);}

/* ── TODAY BANNER ── */
.today-wrap{background:var(--white);border:1.5px solid var(--gold);border-radius:var(--r);margin-bottom:18px;overflow:hidden;box-shadow:var(--sh);}
.today-hdr{background:var(--gold);padding:8px 14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px;}
.today-hdr h2{font-size:10px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:var(--ink);}
.today-hdr em{font-style:normal;font-size:10px;color:rgba(23,21,13,.6);font-weight:600;}
.today-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));}
.t-match{padding:14px 14px;border-right:1px solid var(--rule);border-bottom:1px solid var(--rule);}
.t-match:last-child{border-right:none;}
@media(max-width:540px){.t-match{border-right:none;}}
.tm-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.tm-badge{font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;background:var(--gold-lt);color:var(--gold2);padding:2px 7px;border-radius:20px;border:1px solid var(--gold);}
.tm-time{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);}
.tm-fix{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px;}
.tm-team{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;}
.tm-team.r{flex-direction:row-reverse;text-align:right;}
.tm-fl{font-size:22px;}
.tm-ctr{display:flex;flex-direction:column;align-items:center;gap:3px;}
.tm-sc{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:var(--gold2);}
.tm-vs{font-size:10px;color:var(--faint);font-weight:600;}
.st-live{color:var(--red);font-size:9px;font-weight:800;animation:blink 1.4s infinite;}
.st-ft{color:var(--green);font-size:9px;font-weight:700;}
.st-ns{color:var(--gold2);font-size:9px;font-weight:700;}
.tm-venue{font-size:9px;color:var(--faint);text-align:center;margin-top:3px;}
.tm-goals{font-size:10px;color:var(--muted);text-align:center;margin-top:6px;line-height:1.5;}
.tm-goals b{color:var(--ink2);}
.cd-bar{background:var(--gold-bg);border-top:1px solid var(--rule);padding:7px 14px;display:flex;align-items:center;flex-wrap:wrap;gap:8px;font-size:11px;color:var(--gold2);}
.cd-bar strong{font-family:'JetBrains Mono',monospace;}

/* ── GROUPS ── */
.sec-hd{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
.sec-hd h2{font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-left:auto;}
.leg{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted);}
.leg-dot{width:9px;height:9px;border-radius:2px;}
.groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(275px,1fr));gap:13px;}
.gc(background:var(--white);border:1px solid var(--rule);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);}
.gc-hd{padding:10px 13px;display:flex;align-items:center;gap:8px;
